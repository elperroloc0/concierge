{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Concierge Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/portal.css' %}" rel="stylesheet">
  <style>
    body { background: var(--dark-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { border: none; border-radius: var(--radius-xl); width: 100%; max-width: 380px; box-shadow: var(--shadow-xl); }
    .brand-text { color: #fff; font-weight: 700; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }
    .brand-text i { color: var(--primary-color); background: rgba(59, 130, 246, 0.2); padding: 8px; border-radius: 10px; margin-right: 12px; font-size: 1.2rem; }
  </style>
</head>
<body class="fade-in">
  <div class="text-center">
    <div class="brand-text mb-4"><i class="bi bi-telephone-fill"></i> Concierge AI</div>
    <div class="card login-card p-4 mx-auto">
      <h5 class="mb-4 fw-bold" style="color: var(--text-primary);">Restaurant Portal</h5>

      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label class="form-label small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label small fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold btn-lg">Sign in</button>
      </form>
    </div>
    <p class="text-white-50 small mt-3">Powered by AI Concierge</p>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
