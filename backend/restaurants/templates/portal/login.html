{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Concierge Portal</title>
  <link href="{% static 'css/portal-v2.css' %}" rel="stylesheet">
</head>
<body>
  <div class="v2-backdrop grain">
    <div class="orb-accent" style="top: -120px; right: -100px; opacity: 0.40;"></div>
    <div class="orb-cream"  style="bottom: -100px; left: -80px; opacity: 0.70;"></div>
  </div>

  <main class="login-shell">
    <div class="login-card glass-deep">
      <h2>Restaurant Portal</h2>
      <div class="login-tagline">Sign in to manage calls, guests and bookings.</div>

      {% if error %}
        <div class="v2-alert" style="margin-bottom: 16px;">{{ error }}</div>
      {% endif %}

      <form method="post" style="display: flex; flex-direction: column; gap: 14px;">
        {% csrf_token %}
        <div class="field">
          <label class="field-label" for="id_email">Email</label>
          <input id="id_email" type="email" name="email" class="input" autofocus required>
        </div>
        <div class="field">
          <label class="field-label" for="id_password">Password</label>
          <input id="id_password" type="password" name="password" class="input" required>
        </div>
        <button type="submit" class="btn btn-accent btn-lg btn-block" style="margin-top: 6px;">
          Sign in
        </button>
        <div style="text-align: center; margin-top: 4px;">
          <a href="{% url 'portal_password_reset_request' %}" class="link-muted">
            Forgot your password?
          </a>
        </div>
      </form>
    </div>
  </main>

  <div class="login-foot">Powered by AI Concierge</div>
</body>
</html>
