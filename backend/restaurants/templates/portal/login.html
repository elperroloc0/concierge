<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Concierge Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { border: none; border-radius: 16px; width: 100%; max-width: 380px; }
    .brand-text { color: #e2b96f; font-weight: 700; font-size: 1.4rem; }
  </style>
</head>
<body>
  <div class="text-center">
    <p class="brand-text mb-4"><i class="bi bi-telephone-fill"></i> Concierge</p>
    <div class="card login-card shadow-lg p-4">
      <h5 class="mb-4 fw-bold">Restaurant Portal</h5>

      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label class="form-label small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label small fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 fw-semibold">Sign in</button>
      </form>
    </div>
    <p class="text-white-50 small mt-3">Powered by AI Concierge</p>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
