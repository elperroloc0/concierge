{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select Restaurant — Concierge Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/portal.css' %}" rel="stylesheet">
  <style>
    body { background: var(--color-sidebar-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .selector-card { border: none; border-radius: var(--radius-xl); width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); }
    .brand-text { color: #fff; font-weight: 700; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }
    .brand-text i { color: var(--color-primary-400); background: rgb(67 97 238 / 0.15); padding: 8px; border-radius: var(--radius-sm); margin-right: 12px; font-size: 1.2rem; }
    .restaurant-link { text-decoration: none; color: inherit; }
    .restaurant-link:hover .restaurant-item { background: var(--color-primary-400); color: #fff; }
    .restaurant-link:hover .restaurant-item .text-muted { color: rgba(255,255,255,.7) !important; }
    .restaurant-link:hover .restaurant-item .bi-chevron-right { color: #fff; }
    .restaurant-item { border-radius: 8px; padding: .75rem 1rem; transition: background .15s, color .15s; border: 1px solid #e5e7eb; }
  </style>
</head>
<body class="fade-in">
  <div class="text-center">
    <div class="brand-text mb-4"><i class="bi bi-telephone-fill"></i> Concierge</div>
    <div class="card selector-card p-4 mx-auto">
      <h5 class="mb-1">Select a Restaurant</h5>
      <p class="text-muted small mb-3">You have access to multiple restaurants.</p>
      <div class="d-grid gap-2">
        {% for m in memberships %}
        <a href="{% url 'portal_dashboard' slug=m.restaurant.slug %}" class="restaurant-link">
          <div class="restaurant-item d-flex align-items-center justify-content-between">
            <div class="text-start">
              <div class="fw-semibold">{{ m.restaurant.name }}</div>
              <small class="text-muted">{{ m.get_role_display }}</small>
            </div>
            <i class="bi bi-chevron-right text-muted"></i>
          </div>
        </a>
        {% endfor %}
      </div>
    </div>
    <a href="{% url 'portal_logout' %}" class="text-white-50 small mt-3 d-inline-block text-decoration-none">
      <i class="bi bi-box-arrow-left"></i> Logout
    </a>
  </div>
</body>
</html>
