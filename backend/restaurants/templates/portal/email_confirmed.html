<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmation | Concierge AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      max-width: 450px;
      width: 100%;
      padding: 2.5rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.05);
      text-align: center;
    }
    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    .success-icon { background: rgba(25, 135, 84, 0.1); color: #198754; }
    .error-icon { background: rgba(220, 53, 69, 0.1); color: #dc3545; }
  </style>
</head>
<body>

  <div class="auth-card">
    {% if success %}
      <div class="icon-circle success-icon">
        <i class="bi bi-check-circle-fill"></i>
      </div>
      <h3 class="fw-bold mb-3">Email Confirmed!</h3>
      <p class="text-muted mb-4">Your email address has been successfully updated to <strong>{{ new_email }}</strong>.</p>
    {% else %}
      <div class="icon-circle error-icon">
        <i class="bi bi-x-circle-fill"></i>
      </div>
      <h3 class="fw-bold mb-3">Confirmation Failed</h3>
      <p class="text-muted mb-4">{{ error }}</p>
    {% endif %}

    <a href="{% url 'portal_login' %}" class="btn btn-primary w-100 py-2">
      Return to Portal
    </a>
  </div>

</body>
</html>
