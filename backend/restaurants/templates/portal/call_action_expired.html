{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#1f3fc3">
  <title>{{ t.restaurant.name }} — Link expired</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="{% static 'css/portal-v2.css' %}" rel="stylesheet">
  <style>
    body {
      background: var(--cream-200);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
    }
    .expd {
      max-width: 420px; width: 100%;
      background: rgba(255, 252, 248, 0.92);
      border: 1px solid var(--warm-line);
      border-radius: 24px;
      box-shadow: 0 16px 40px -16px rgba(56, 36, 12, 0.25);
      padding: 36px 28px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .expd::after {
      content: ''; position: absolute;
      top: -80px; right: -80px;
      width: 220px; height: 220px;
      border-radius: 99px;
      background: rgba(217, 119, 6, 0.20);
      filter: blur(40px);
      pointer-events: none;
    }
    .expd > * { position: relative; z-index: 1; }
    .expd-ico {
      width: 84px; height: 84px;
      border-radius: 99px;
      background: linear-gradient(135deg, #d97706, #92400e);
      color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 18px;
      box-shadow: 0 12px 28px -10px rgba(146, 64, 14, 0.50);
    }
    .expd h1 {
      font: 900 26px 'Geist', sans-serif; letter-spacing: -.035em;
      margin-bottom: 10px;
    }
    .expd p {
      font: 400 14.5px 'Geist', sans-serif;
      color: var(--ink-soft);
      line-height: 1.55;
    }
    .expd-cta {
      margin-top: 22px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px;
      border-radius: 99px;
      background: var(--accent);
      color: white;
      font: 700 14px 'Geist', sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 20px -8px rgba(31, 63, 195, 0.50);
    }
    .expd-cta:hover { background: var(--accent-deep); }
    .expd-meta {
      margin-top: 18px;
      font: 500 11.5px 'Geist Mono', monospace;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="expd">
    <div class="expd-ico"><i class="bi bi-clock-history"></i></div>
    <h1>Link expired</h1>
    <p>
      This response link expired {{ t.expires_at|timesince }} ago.
      The call is still in your portal — open it to review or follow up.
    </p>
    <a href="/portal/{{ t.restaurant.slug }}/calls/" class="expd-cta">
      Open call history <i class="bi bi-arrow-right"></i>
    </a>
    <div class="expd-meta">
      Token created {{ t.created_at|timesince }} ago
    </div>
  </div>
</body></html>
