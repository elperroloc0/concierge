databases:
  - name: concierge-db
    databaseName: concierge
    user: concierge

services:
  - type: web
    name: concierge-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --workers 2 --max-requests 300 --max-requests-jitter 50 --timeout 60"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: concierge-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2

  - type: cron
    name: daily-tasks
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    schedule: "0 13 * * *"
    startCommand: "python manage.py send_trial_expiry_reminder && python manage.py expire_trials && python manage.py send_daily_digest && python manage.py send_event_reminder"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: concierge-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true

  - type: cron
    name: escalation-check
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    schedule: "*/5 * * * *"
    startCommand: "python manage.py run_escalation_check"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: concierge-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_ADMIN_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
