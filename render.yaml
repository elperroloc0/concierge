databases:
  - name: concierge-db
    databaseName: concierge
    user: concierge

services:
  - type: web
    name: concierge-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: concierge-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

  - type: cron
    name: daily-tasks
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    schedule: "0 13 * * *"
    startCommand: "python manage.py send_trial_expiry_reminder && python manage.py expire_trials && python manage.py send_daily_digest"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: concierge-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
